<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>тесты</title>
</head>
<body>
    <style>
        @keyframes text-rainbow-color{
            8%{ color: red   ; }
            16%{ color: orange; }
            24%{ color: yellow; }
            32%{ color: rgb(9, 255, 0) ; }
            40%{ color: #00ffc8 ; }
            48%{ color: rgb(0, 38, 255)  ; }
            56%{ color: violet; }
            /* 64%{ color: rgb(0, 38, 255)  ; } */
            72%{ color: #00ffc8 ; }
            80%{ color: rgb(9, 255, 0) ; }
            88%{ color: yellow; }
            96%{ color: orange; }
            100%{ color: red   ; }

        }

        h1{animation: text-rainbow-color 5s none infinite;
        background-color: black;
        color:red;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;}
    

    </style>
<h1>радужный текст</h1>
</body>
</html>
